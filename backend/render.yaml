# Render 배포 설정 - FastAPI 서버
services:
  - type: web
    name: isoser-backend
    runtime: python
    rootDir: backend
    buildCommand: python check_python_version.py && pip install -r requirements.txt
    startCommand: python check_python_version.py && python rag/seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANONYMIZED_TELEMETRY
        value: "False"
      - key: CHROMA_MODE
        value: persistent
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/chroma_store
      - key: DATA_GO_KR_SERVICE_KEY
        sync: false
      - key: WORKNET_STANDARD_JOB_DESCRIPTION_API_KEY
        sync: false
      - key: WORK24_MAJOR_INFO_AUTH_KEY
        sync: false
      - key: WORK24_JOB_DUTY_AUTH_KEY
        sync: false
      - key: WORK24_COMMON_CODES_AUTH_KEY
        sync: false
      - key: WORK24_JOB_INFO_AUTH_KEY
        sync: false
      - key: NCS_REFERENCE_API_KEY
        sync: false
      - key: NCS_RESOURCE_API_KEY
        sync: false
    disk:
      name: chroma-store
      mountPath: /opt/render/project/src/chroma_store
      sizeGB: 1
