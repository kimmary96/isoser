name: Claude Code Auto Dev

on:
  push:
    paths:
      - "tasks/remote/*.md"
  workflow_dispatch:

jobs:
  claude-dev:
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[codex]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve task source
        shell: bash
        run: |
          mkdir -p .tmp
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TASK_FILE="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" | grep '^tasks/remote/.*\.md$' | tail -n 1)"
            if [[ -z "${TASK_FILE}" ]]; then
              echo "No remote task packet found in push."
              exit 1
            fi
            echo "${TASK_FILE}" > .tmp/task_path.txt
          else
            echo "tasks/remote/manual-task.md" > .tmp/task_path.txt
          fi

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 워크플로는 로컬 Codex watcher를 대체하는 주 경로가 아니라 원격 백업 경로다.
            먼저 repo 상태를 확인하고, `.tmp/task_path.txt`에 적힌 task packet 경로를 읽어라.
            task packet과 현재 코드를 비교하고 drift가 크면 무리하게 구현하지 말고 보고하라.
            CLAUDE.md 파일을 참고해서 프로젝트 구조와 규칙을 파악하고,
            작업이 끝나면 새 브랜치를 만들고 PR을 생성해줘.
